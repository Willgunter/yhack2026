<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 300px; padding: 15px; background: #111827; color: white; font-family: sans-serif; }
        .header { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #374151; padding-bottom: 10px; margin-bottom: 10px; }
        .logo { font-weight: bold; color: #7c3aed; }
        .status { font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .indicator { width: 10px; height: 10px; border-radius: 50%; background: #10b981; }
        .manager { margin-top: 15px; font-size: 12px; color: #9ca3af; background: #1f2937; padding: 8px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="header">
        <span class="logo">🛡️ Praesidia</span>
        <span class="status"><div class="indicator"></div> Active</span>
    </div>
    <div class="content">
        AI Governance Guard is monitoring your activity real-time across GitHub, Slack, and Jira.
    </div>
    <div class="manager" id="manager-info">
        🛡️ High risk actions escalate to the Compliance Manager.
    </div>
</body>
</html>
