<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Praesidia Highlight</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: transparent;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    -webkit-app-region: no-drag;
  }

  .highlight-bar {
    width: 100%;
    height: 100%;
    border: 2px solid #06b6d4;
    border-radius: 10px;
    background: rgba(6, 182, 212, 0.08);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 20px;
    animation: breathe 2s ease-in-out infinite;
    box-shadow: 0 0 20px rgba(6, 182, 212, 0.4), inset 0 0 20px rgba(6, 182, 212, 0.05);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .highlight-bar.visible {
    opacity: 1;
  }

  @keyframes breathe {
    0%, 100% { 
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.3), inset 0 0 15px rgba(6, 182, 212, 0.04);
      border-color: rgba(6, 182, 212, 0.7);
    }
    50% { 
      box-shadow: 0 0 35px rgba(6, 182, 212, 0.7), inset 0 0 30px rgba(6, 182, 212, 0.12);
      border-color: rgba(6, 182, 212, 1);
    }
  }

  .shield-icon {
    font-size: 28px;
    animation: pulse-shield 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse-shield {
    0%, 100% { filter: drop-shadow(0 0 4px rgba(6, 182, 212, 0.6)); }
    50% { filter: drop-shadow(0 0 12px rgba(6, 182, 212, 1)); }
  }

  .info {
    flex: 1;
    min-width: 0;
  }

  .location {
    font-size: 11px;
    color: #67e8f9;
    font-weight: 700;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .summary {
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .badge {
    background: rgba(6, 182, 212, 0.2);
    border: 1px solid rgba(6, 182, 212, 0.4);
    color: #67e8f9;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="highlight-bar" id="bar">
    <div class="shield-icon">🛡️</div>
    <div class="info">
      <div class="location" id="location">Scanning...</div>
      <div class="summary" id="summary"></div>
    </div>
    <div class="badge">VIOLATION</div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    ipcRenderer.on('show-highlight', (_, data) => {
      const { file, line, summary } = data;
      document.getElementById('location').textContent = `${file || 'unknown file'} : Line ${line || 0}`;
      document.getElementById('summary').textContent = summary || 'Compliance violation detected';
      setTimeout(() => {
        document.getElementById('bar').classList.add('visible');
      }, 100);
    });
  </script>
</body>
</html>
