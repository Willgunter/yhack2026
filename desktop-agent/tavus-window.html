<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #111827; overflow: hidden; font-family: sans-serif; }
        .drag-bar { height: 30px; background: rgba(0, 0, 0, 0.5); -webkit-app-region: drag; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .close-btn { position: absolute; right: 10px; top: 5px; color: white; -webkit-app-region: no-drag; cursor: pointer; }
        .video-container { width: 100%; height: 100vh; background: black; display: flex; justify-content: center; align-items: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 20px; color: #f3f4f6; text-align: center; }
        .badge { background: #ef4444; color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; margin-bottom: 8px; display: inline-block; }
    </style>
</head>
<body>
    <div class="drag-bar">
        <div class="close-btn" onclick="window.close()">✕</div>
    </div>
    <div class="video-container">
        <!-- In a full Pipecat integration, this would stream the WebRTC incoming track -->
        <video id="tavus-replica" autoplay loop muted>
            <!-- Simulated Persona Video stream placeholder -->
        </video>
        <div class="overlay">
            <div class="badge">Sovereign Compliance Officer</div>
            <p id="reasoning-text">"Analyzing Security Violation..."</p>
        </div>
    </div>
    <!-- Load Tavus Stream Logic -->
    <script src="./tavus-stream.js"></script>
</body>
</html>
